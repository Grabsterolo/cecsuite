name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */3 * *'   # cada 3 días a las 8am UTC (2am Costa Rica)
  workflow_dispatch:          # permite correrlo manualmente desde GitHub si hace falta

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://awtydyrdhijjafwvxbzp.supabase.co/rest/v1/departments?select=id&limit=1" \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"
